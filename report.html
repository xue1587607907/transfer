<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
</head>
<body style="font-family: Microsoft YaHei, Arial; font-size:14px; color:#333; margin:0; padding:20px;">
<div style="padding:20px; border-radius:8px; background:#f8f9fa; border:1px solid #e2e3e5;">
  <div style="font-size:16px; font-weight:bold; color:#2c3e50; margin-bottom:10px;">
    API自动化测试执行报告
  </div>
  <hr style="border:none; border-top:1px solid #eee; margin:12px 0;">

  <div style="margin:6px 0; line-height:1.6;">构建名称：${env.JOB_NAME}</div>
  <div style="margin:6px 0; line-height:1.6;">构建编号：${env.BUILD_NUMBER}</div>
  <div style="margin:6px 0; line-height:1.6;">执行环境：${summary.env}</div>
  <div style="margin:6px 0; line-height:1.6;">
    执行状态：
    <span style="color:${currentBuild.currentResult == 'SUCCESS' ? '#28a745' : '#dc3545'}; font-weight:bold;">
            ${currentBuild.currentResult}
        </span>
  </div>

  <hr style="border:none; border-top:1px solid #eee; margin:12px 0;">

  <div style="margin:6px 0; line-height:1.6;">用例总数：${summary.total}</div>
  <div style="margin:6px 0; line-height:1.6; color:#28a745; font-weight:bold;">通过数：${summary.passed}</div>
  <div style="margin:6px 0; line-height:1.6; color:#dc3545; font-weight:bold;">失败数：${summary.failed}</div>
  <div style="margin:6px 0; line-height:1.6;">跳过数：${summary.skipped}</div>
  <div style="margin:6px 0; line-height:1.6; color:#28a745; font-weight:bold;">通过率：${summary.passRate}%</div>

  <hr style="border:none; border-top:1px solid #eee; margin:12px 0;">

  <div style="margin:6px 0; line-height:1.6;">
    构建地址：<a href="${env.BUILD_URL}" style="color:#17a2b8;">点击查看</a>
  </div>
  <div style="margin:6px 0; line-height:1.6;">
    Allure报告：<a href="${env.BUILD_URL}allure" style="color:#17a2b8;">点击查看完整报告</a>
  </div>

  <hr style="border:none; border-top:1px solid #eee; margin:12px 0;">
  <div style="margin-top:10px; color:#666;">本邮件由Jenkins自动发送，无需回复。失败用例请及时排查。</div>
</div>
</body>
</html>
